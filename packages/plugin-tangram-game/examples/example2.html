<html>
<head>
  <script src="../dist/tangram.js"></script>
  <script src="../dist/tangrampiece.js"></script>
  <script src="../dist/tangramutils.js"></script>
  <script src="../dist/timebar.js"></script>

  <style id="tangram-styles">
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    #container {
      position: absolute;
      width: 100vw;
      height: 100vh;
    }

    #svgObject, #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #overlay {
      pointer-events: none; /* clicks go to SVG */
    }
  </style>
</head>
<body>

<div id="container">
  <object id="svgObject" 
          data="puzzles/puzzle-rocket.svg" 
          type="image/svg+xml" 
          preserveAspectRatio="xMidYMid meet"
          onload="start()">
  </object>
  <canvas id="overlay"></canvas>
</div>

<script>
var tangram = null;
function start() {
  tangram = new TangramGame(null); 
  tangram.start();
} 
</script>

</body>
</html>
