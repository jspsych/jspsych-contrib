name: release

env:
  HUSKY: 0

on: 
  push:
    branches:
      - main

permissions:
  contents: read
    
jobs:
  release:
    name: Release
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup Node.js 20.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 #v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --ci --maxWorkers=2
        env:
          NODE_OPTIONS: "--max-old-space-size=4096" # Increase heap size for jest

      - name: Create Release Pull Request or Publish Packages
        uses: changesets/action@41adcfa1f4c9a2f03ee74a426a8878a2b8cf7b85 # master
        with:
          version: npm run changeset:version
          publish: npm run changeset:publish
          commit: "chore(release): version packages"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update README list of plugins and extensions
        run: npm run update-readme
      
